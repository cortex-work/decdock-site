    <script type="application/ld+json">

        "applicationCategory": "BusinessApplication",
        "applicationSubCategory": "Decision registry / corporate memory (karar sicili)",

        "inLanguage": "tr",
        "description": "Decdock, şirket içi e-posta ve toplantı yazışmalarından kaynağa bağlı, denetlenebilir bir karar sicili çıkarır: ne kararlaştırıldı, kim onayladı, ne zaman, hangi gerekçeyle. Onaylanmış kararı 'karar sanılan' öneriden ayırır.",

          "Yazışmalardan otomatik karar çıkarımı",

        "audience": {

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Bu gözetim mi? KVKK ve veri imha tarafı nasıl işliyor?",
            "acceptedAnswer": { "@type": "Answer", "text": "Decdock izleme sistemi değildir; yalnız seçtiğiniz, bitmiş bir dilimi rapor için işler. Sicil \"kim ne yaptı\"yı değil, \"ne kararlaştırıldı\"yı gösterir; teslim sonrası ham veri imha edilir ve yazılı teyit verilir." }
          },
          {
            "@type": "Question",
            "name": "Özet veya toplantı asistanları bunu zaten yapmıyor mu?",
            "acceptedAnswer": { "@type": "Answer", "text": "Onlar \"bu hafta ne konuşuldu?\" sorusunu özetler. Decdock \"ne kararlaştırıldı, kim onayladı, hâlâ geçerli mi?\" sorusunun kalıcı sicilini tutar; öneriyi karardan ayırır." }
          },
          {
            "@type": "Question",
            "name": "Ya yanlış bir şeyi karar diye yazarsa?",
            "acceptedAnswer": { "@type": "Answer", "text": "Emin olmadığını sicile yazmaz: aday ikinci doğrulamadan geçer, onay yoksa gerekçesiyle dışarıda kalır." }
          }
        ]
      }
    </script>
