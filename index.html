<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Decdock Core | Keep decisions from getting lost</title>
    <meta
      name="description"
      content="Decdock Core helps teams track what was decided, who owns it, and whether it still holds across meetings, messages, and documents."
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#F4EEE6" />
    <link rel="canonical" href="https://decdock.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://decdock.com" />
    <meta
      property="og:title"
      content="Decdock Core | Keep decisions from getting lost"
    />
    <meta
      property="og:description"
      content="Decdock Core helps teams track what was decided, who owns it, and whether it still holds across meetings, messages, and documents."
    />
    <meta property="og:image" content="https://decdock.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Decdock Core social preview about keeping important decisions from getting lost."
    />
    <meta property="og:site_name" content="Decdock" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Decdock Core | Keep decisions from getting lost"
    />
    <meta
      name="twitter:description"
      content="Decdock Core helps teams track what was decided, who owns it, and whether it still holds across meetings, messages, and documents."
    />
    <meta name="twitter:image" content="https://decdock.com/og-image.png" />
    <meta
      name="twitter:image:alt"
      content="Decdock Core social preview about keeping important decisions from getting lost."
    />

    <!-- Fonts: Manrope + Newsreader -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,600;6..72,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
