    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Verimiz güvende mi? KVKK tarafı nasıl işliyor?",
            "acceptedAnswer": { "@type": "Answer", "text": "Decdock izleme sistemi değildir; yalnız sizin seçtiğiniz, bitmiş bir dilimi işler. Veri tek amaçla kullanılır (rapor üretimi), teslim sonrası ham veri imha edilir ve bu yazılı olarak teyit edilir. İK, disiplin ve hukuki ihtilaf içerikleri ilk dilimde zaten kabul edilmez." }
          },
          {
            "@type": "Question",
            "name": "Çalışanlar bunu gözetim olarak algılamaz mı?",
            "acceptedAnswer": { "@type": "Answer", "text": "Sicil \"kim ne yaptı\"yı değil, \"ne kararlaştırıldı\"yı gösterir. Sahipsiz karar bulgusu bile kişiye değil sürece işaret eder. Decdock bir suçlama aracı değil, bağlam aracıdır — amaç geçmişi sorgulamak değil, kurumsal hafızayı korumaktır." }
          },
          {
            "@type": "Question",
            "name": "Copilot veya benzeri araçlar bunu zaten yapmıyor mu?",
            "acceptedAnswer": { "@type": "Answer", "text": "Onlar \"bu hafta ne konuşuldu?\" sorusunu özetler; özet o anda tüketilir ve kaybolur. Decdock \"ne kararlaştırıldı, kim onayladı, hâlâ geçerli mi?\" sorusunun kalıcı ve denetlenebilir kaydını tutar — her kayıt kaynağındaki cümleye bağlıdır. Ayrıca öneriyi karardan ayırır; özet araçları bu ayrımı yapmaz." }
          },
          {
            "@type": "Question",
            "name": "Ya yanlış bir şeyi karar diye yazarsa?",
            "acceptedAnswer": { "@type": "Answer", "text": "Emin olmadığını sicile yazmaz: her aday ikinci bir doğrulamadan geçer, onaylanmamış ifadeler sicil dışı kalır ve gerekçesi görünür olur. İlke basit: ya güvenilir biçimde vardır, ya gösterilmez." }
          }
        ]
      }
    </script>
