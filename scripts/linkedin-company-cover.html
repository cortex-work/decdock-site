<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* Şirket kapağı ~1128x191 → 2x: 2256x382. Avatar SOL-ALT'ı kapatır:
     tüm okunur içerik SAĞDA, sol yalnızca dekoratif (örtülebilir). Ad+tagline'ı
     TEKRAR ETME — LinkedIn onları kapağın altında zaten gösteriyor. */
  html, body { width: 2256px; height: 382px; overflow: hidden; }
  body {
    font-family: 'Manrope', sans-serif;
    background:
      radial-gradient(circle at 86% 24%, rgba(216,203,190,0.40), transparent 42%),
      radial-gradient(circle at 10% 70%, rgba(154,132,111,0.14), transparent 40%),
      linear-gradient(150deg, #f6f0e8 0%, #efe5d8 60%, #e9ddcd 100%);
    color: #2f2925; position: relative;
  }
  /* Dekoratif soluk mühür halkası — solda, avatar örtebilir, sorun değil */
  .seal-ghost {
    position: absolute; left: 150px; top: 50%; transform: translateY(-50%);
    width: 300px; height: 300px; border-radius: 64px;
    border: 14px solid rgba(161,118,78,0.12);
    box-shadow: inset 0 0 0 18px rgba(244,238,230,0.5);
  }
  .right {
    position: absolute; top: 50%; right: 150px; transform: translateY(-50%);
    text-align: right; max-width: 1300px;
  }
  .eyebrow {
    font-size: 26px; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase;
    color: #a1764e; margin-bottom: 22px;
  }
  .line {
    font-family: 'Newsreader', serif; font-size: 56px; font-weight: 600;
    letter-spacing: -0.01em; line-height: 1.1; color: #2f2925; white-space: nowrap;
  }
  .line b { color: #2f2925; }
  .domain { font-size: 28px; font-weight: 700; color: #5e5650; margin-top: 26px; letter-spacing: 0.01em; }
</style>
</head>
<body>
  <div class="seal-ghost"></div>
  <div class="right">
    <div class="eyebrow">Yazışmalardan otomatik</div>
    <div class="line">ne kararlaştırıldı · kim onayladı · ne zaman</div>
    <div class="domain">decdock.com</div>
  </div>
</body>
</html>
