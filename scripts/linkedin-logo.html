<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,600;6..72,700&family=Manrope:wght@600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 600px; height: 600px; overflow: hidden; }
  body {
    font-family: 'Manrope', sans-serif;
    background:
      radial-gradient(circle at 30% 26%, rgba(216,203,190,0.50), transparent 60%),
      linear-gradient(155deg, #f6f0e8 0%, #ece1d3 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .seal {
    width: 384px; height: 384px;
    border: 6px solid #a1764e;
    border-radius: 80px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 0 0 10px rgba(244,238,230,0.9), inset 0 0 0 13px rgba(161,118,78,0.32);
    background: rgba(250,245,239,0.5);
  }
  .d {
    font-family: 'Newsreader', serif; font-weight: 600;
    font-size: 290px; line-height: 1; color: #2f2925;
    margin-top: -16px;
  }
  .tag {
    position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%);
    font-size: 19px; font-weight: 700; letter-spacing: 0.34em; text-transform: uppercase;
    color: #a1764e; white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="seal">
    <span class="d">D</span>
    <span class="tag">Decdock</span>
  </div>
</body>
</html>
