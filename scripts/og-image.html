<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,600;6..72,700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Manrope', sans-serif;
    background:
      radial-gradient(circle at 12% 15%, rgba(216,203,190,0.44), transparent 30%),
      radial-gradient(circle at 88% 10%, rgba(92,117,96,0.14), transparent 25%),
      linear-gradient(165deg, #f6f0e8 0%, #efe5d8 58%, #e9ddcd 100%);
    color: #2f2925;
    display: flex;
    align-items: center;
    padding: 0 72px;
    position: relative;
  }
  .left { width: 660px; }
  .eyebrow {
    display: inline-block;
    font-size: 17px; font-weight: 800;
    color: #a1764e; text-transform: uppercase;
    border: 1px solid rgba(94,86,80,0.2); border-radius: 999px;
    padding: 10px 22px; background: rgba(249,243,236,0.72);
    margin-bottom: 34px;
  }
  h1 {
    font-family: 'Newsreader', serif;
    font-size: 78px; font-weight: 600; line-height: 1.03;
    margin-bottom: 28px;
  }
  .sub { font-size: 25px; line-height: 1.55; color: #5e5650; max-width: 630px; }
  .domain {
    position: absolute; bottom: 44px; left: 72px;
    font-size: 22px; font-weight: 700; color: #2f2925;
  }
  .panel {
    position: absolute; right: 62px; top: 50%;
    transform: translateY(-50%) rotate(1deg);
    width: 400px; border-radius: 24px;
    border: 1px solid rgba(94,86,80,0.18);
    background: linear-gradient(180deg, rgba(250,245,239,0.99), rgba(241,234,224,0.98));
    box-shadow: 0 36px 90px rgba(36,29,24,0.18);
    overflow: hidden;
  }
  .panel-head {
    display: flex; justify-content: space-between; align-items: center;
    padding: 22px 24px; border-bottom: 1px solid rgba(94,86,80,0.14);
  }
  .label { font-size: 13px; font-weight: 800; color: #93867b; text-transform: uppercase; }
  .badge {
    font-size: 12px; font-weight: 800; text-transform: uppercase;
    color: #5c7560; border: 1px solid rgba(92,117,96,0.28);
    background: rgba(238,242,237,0.95); border-radius: 999px; padding: 6px 14px;
  }
  .rows { padding: 22px 24px 24px; }
  .row { display: grid; grid-template-columns: 92px 1fr; gap: 14px; align-items: center; margin-bottom: 16px; }
  .row:last-child { margin-bottom: 0; }
  .row-label { font-size: 13px; font-weight: 800; color: #a1764e; text-transform: uppercase; }
  .rail {
    position: relative; height: 34px; border-radius: 8px;
    border: 1px solid rgba(94,86,80,0.14); background: rgba(244,238,230,0.72);
  }
  .rail::before {
    content: ''; position: absolute; left: 14px; right: 14px; top: 50%; height: 2px;
    transform: translateY(-50%); background: #d8c4ae;
  }
  .dot {
    position: absolute; top: 50%; width: 12px; height: 12px; border-radius: 50%;
    transform: translateY(-50%); border: 2px solid #5c7560; background: #f6f0e8;
  }
  .dot.two { border-color: #a1764e; }
  .foot {
    border-top: 1px solid rgba(94,86,80,0.14);
    padding: 18px 24px;
    font-size: 18px; font-weight: 700; line-height: 1.35;
  }
</style>
</head>
<body>
  <div class="left">
    <div class="eyebrow">Decdock - The write boundary</div>
    <h1>Resolve decisions, not just store them.</h1>
    <p class="sub">Source-linked decision governance for duplicates, contradictions, supersession, authority, and exceptions.</p>
  </div>
  <div class="domain">decdock.com</div>

  <div class="panel">
    <div class="panel-head">
      <span class="label">Review gate</span>
      <span class="badge">Verified</span>
    </div>
    <div class="rows">
      <div class="row">
        <span class="row-label">Dedupe</span>
        <span class="rail"><span class="dot" style="left: 42%"></span></span>
      </div>
      <div class="row">
        <span class="row-label">Conflict</span>
        <span class="rail"><span class="dot two" style="left: 34%"></span><span class="dot" style="left: 69%"></span></span>
      </div>
      <div class="row">
        <span class="row-label">Supersede</span>
        <span class="rail"><span class="dot" style="left: 76%"></span></span>
      </div>
    </div>
    <div class="foot">Only reviewed writes return to the graph.</div>
  </div>
</body>
</html>
